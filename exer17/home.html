<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>


    <script>
        let temprature=prompt("enter the temprature");

        if(temprature<0){
            console.log("very cold");
        }
        else if(temprature>0 && temprature<15){
            console.log("cold");
        }
        else if(temprature>=15 && temprature<25){
            console.log("warm");
        }
        else{
            console.log("hot");
        }
    </script>
    
</body>
</html>
