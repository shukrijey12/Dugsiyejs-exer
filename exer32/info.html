<!DOCTYPE html>
<html lang="en">
<head>
    <title>DOM Practice</title>
    <style>
        .active{
            background-color: lightblue;
            padding: 10px;
        }
    </style>
</head>
<body>

    <h1 id="title">Welcome to DOM</h1>

    <input type="text" id="userInput" placeholder="Enter your name">

    <button id="changeBtn">Change Title</button>
    <button id="addBtn">Add Paragraph</button>
    <button id="deleteBtn">Delete Paragraph</button>
    <button id="toggleBtn">Toggle Color</button>

    <div id="container">
        <p id="para">This is the first paragraph.</p>
    </div>

<script>

// Selecting Elements
const title = document.getElementById("title");
const para = document.querySelector("#para");
const container = document.querySelector("#container");
const input = document.querySelector("#userInput");

// Change Text
document.querySelector("#changeBtn").addEventListener("click", function(){

    const name = input.value;

    title.textContent = "Hello " + name;

});

// Create New Element
document.querySelector("#addBtn").addEventListener("click", function(){

    const newPara = document.createElement("p");

    newPara.textContent = "New paragraph added!";

    container.appendChild(newPara);

});

// Remove Element
document.querySelector("#deleteBtn").addEventListener("click", function(){

    const lastParagraph = container.lastElementChild;

    if(lastParagraph){
        lastParagraph.remove();
    }

});

// Change Style & Class
document.querySelector("#toggleBtn").addEventListener("click", function(){

    container.classList.toggle("active");

});

// innerHTML Example
container.innerHTML += "<h3>DOM Practice Section</h3>";

</script>

</body>
</html>
