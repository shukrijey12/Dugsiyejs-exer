<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>



        let color=["red","blue","green","yellow" , "black" , "blue-dark" , "white"];
          color.push("pink");
          console.log(color ,"after push");
          color.pop();
            console.log(color ,"after pop");
            color.unshift("purple");
            console.log(color ,"after unshift");
            color.shift();
            console.log(color ,"after shift");
    </script>
    
</body>
</html>
