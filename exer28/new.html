<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //promises
        async function  fetchData(){
            return new Promise((resolve, reject)=>{
                setTimeout(()=>{
                    const data={name:"cali" , age: 30};
                    resolve(data);
                
                } ,2000);
            });
        }
        
        fetchData()
            .then(data => {
                console.log(data);
            })
            .catch(error => {
                console.error("error fetching data", error);
            });


    </script>
    
</body>
</html>
